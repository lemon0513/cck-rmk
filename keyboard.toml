[keyboard]
name = "CCK"
product_name = "CCK"
vendor_id = 0x1313
product_id = 0x0001
manufacturer = "WK"
chip = "nrf52840"
# board = "nice!nano_v2" # optional, cannot be used with `chip`
# If your chip doesn't have a functional USB peripheral, for example, nRF52832/esp32c3(esp32c3 has only USB serial, not full functional USB), set `usb_enable` to false
# usb_enable = true

[layout]
rows = 5
cols = 12
layers = 10
keymap = [
    [
        ["_", "_", "_", "_", "_", "_",     "_", "_", "_", "_", "_", "_"],
        ["_", "_", "_", "_", "_", "_",     "_", "_", "_", "_", "_", "_"],
        ["_", "_", "_", "_", "_", "_",     "_", "_", "_", "_", "_", "_"],
        ["_", "_", "_", "_", "_", "_",     "_", "_", "_", "_", "_", "_"],
        ["_", "_", "_", "_", "_", "_",     "_", "_", "_", "_", "_", "_"]
    ],
]

[ble]
enabled = true
battery_adc_pin = "P0_28"
adc_divider_measured = 2000
adc_divider_total = 2806

[split]
connection = "ble"

[split.central]
rows = 5
cols = 6
row_offset = 0
col_offset = 0
# ble_addr = [0x18, 0xe2, 0x21, 0x80, 0xc0, 0xc7]

[split.central.matrix]
matrix_type = "normal"
input_pins = ["P0_11", "P1_00", "P0_24", "P0_22", "P1_13"]
output_pins = ["P1_15", "P0_09", "P0_10", "P1_11", "P1_04", "P1_06"]

# Encoder 0
[[split.central.input_device.encoder]]
pin_a = "P0_29"
pin_b = "P0_02"
phase = "resolution"
resolution = 2
internal_pullup = true
reverse =  false


[[split.peripheral]]
rows = 5
cols = 6
row_offset = 0
col_offset = 6
# ble_addr = [0x7e, 0xfe, 0x73, 0x9e, 0x66, 0xe3]

[split.peripheral.matrix]
matrix_type = "normal"
input_pins = ["P0_11", "P1_00", "P0_24", "P0_22", "P1_13"]
output_pins = ["P1_15", "P0_09", "P0_10", "P1_11", "P1_04", "P1_06"]

# Encoder 1
[[split.peripheral.input_device.encoder]]
pin_a = "P0_29"
pin_b = "P0_02"
phase = "resolution"
resolution = 2
internal_pullup = true
reverse =  false

[light]
# All light pins are high-active by default, uncomment if you want it to be low-active
# capslock.pin = "PB2"
# capslock.low_active = true
# scrolllock.pin = "PA3"
# scrolllock.low_active = true
# Just ignore if no light pin is used for it
# numslock.pin = "PA5"
# numslock.low_active = true

[behavior.morse]  
# 为 autoshift 优化的配置  
enable_flow_tap = false  
gap_timeout = "50ms"      # 快速结束 morse 判定,避免意外双击  
hold_timeout = "200ms"    # autoshift 触发时间  
hold_on_other_press = true  

[storage]
# Storage feature is enabled by default
enabled = true
# clear_storage = true

[rmk]
combo_max_num = 32
tap_dance_max_num = 32
