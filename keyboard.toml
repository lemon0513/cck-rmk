[ble]
enabled = true
battery_adc_pin = "P0_28"
adc_divider_measured = 2000
adc_divider_total = 2806
charge_state.pin = "P1_11"
charge_state.low_active = false

[split]
connection = "ble"

[split.central]
rows = 5
cols = 6
row_offset = 0
col_offset = 0
# ble_addr = [0x18, 0xe2, 0x21, 0x80, 0xc0, 0xc7]

[split.central.matrix]
matrix_type = "normal"
input_pins = ["P0_11", "P1_00", "P0_24", "P0_22", "P1_13"]
output_pins = ["P1_15", "P0_09", "P0_10", "P1_11", "P1_04", "P1_06"]

[[split.peripheral]]
rows = 5
cols = 6
row_offset = 0
col_offset = 6
# ble_addr = [0x7e, 0xfe, 0x73, 0x9e, 0x66, 0xe3]

[split.peripheral.matrix]
matrix_type = "normal"
input_pins = ["P0_11", "P1_00", "P0_24", "P0_22", "P1_13"]
output_pins = ["P1_15", "P0_09", "P0_10", "P1_11", "P1_04", "P1_06"]

# Encoder 0
[[input_device.encoder]]
pin_a = "P0_29"
pin_b = "P0_02"
phase = "default" 
# Encoder 1
[[input_device.encoder]]
pin_a = "P0_29"
pin_b = "P0_02"
phase = "default" 

